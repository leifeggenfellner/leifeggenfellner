# Generates GitHub stats SVGs locally using the official github-readme-stats
# GitHub Action. No dependency on the public Vercel endpoint.

name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_border=true&bg_color=0B1026&title_color=A855F7&icon_color=22D3EE&text_color=E5E7EB&hide_rank=true&include_all_commits=true&disable_animations=true"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=0B1026&title_color=A855F7&text_color=E5E7EB&langs_count=6&disable_animations=true"
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update GitHub stats cards [skip ci]"
          git push
